name: Java CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: healthapi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: healthapi/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build application
        run: ./mvnw package -DskipTests

      - name: Check jar file exists
        run: ls -lh target/*.jar

      - name: Run jar file
        run: |
          java -jar target/*.jar &
          sleep 15
          curl --fail http://localhost:8080/health-check

      - name: Build Docker image
        run: docker build -t healthapi:${{ github.sha }} .

      - name: Run Docker container
        run: docker run -d --name healthapi-container -p 8081:8080 healthapi:${{ github.sha }}

      - name: Test Docker container endpoint
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent --show-error http://localhost:8081/health-check; then
              echo
              exit 0
            fi

            sleep 3
          done

          exit 1

      - name: Show Docker logs if needed
        if: failure()
        run: docker logs healthapi-container || true

      - name: Stop Docker container
        if: always()
        run: docker rm -f healthapi-container || true
