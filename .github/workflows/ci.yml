name: Java CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: healthapi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: healthapi/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build application
        run: ./mvnw package -DskipTests

      - name: Check jar file exists
        run: ls -lh target/*.jar

      - name: Build Docker image
        run: docker build -t healthapi:${{ github.sha }} .

      - name: Remove old container if it exists
        run: docker rm -f healthapi-container || true

      - name: Run Docker container
        run: docker run -d --name healthapi-container -p 8081:8080 healthapi:${{ github.sha }}

      - name: Test Docker container endpoint
        run: |
          for attempt in {1..10}; do
            echo "Attempt $attempt: checking /health-check"

            if curl --fail --silent --show-error http://localhost:8081/health-check; then
              echo
              echo "Docker container health check passed"
              exit 0
            fi

            sleep 3
          done

          echo "Docker container health check failed"
          exit 1

      - name: Save Docker image as tar
        run: docker save healthapi:${{ github.sha }} -o healthapi-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthapi-docker-image
          path: healthapi/healthapi-image.tar

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Docker image for GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag healthapi:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/healthapi:latest
          docker tag healthapi:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/healthapi:${{ github.sha }}

      - name: Push Docker image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/healthapi:latest
          docker push ghcr.io/${{ github.repository_owner }}/healthapi:${{ github.sha }}

      - name: Show Docker logs if needed
        if: failure()
        run: docker logs healthapi-container || true

      - name: Stop Docker container
        if: always()
        run: docker rm -f healthapi-container || true